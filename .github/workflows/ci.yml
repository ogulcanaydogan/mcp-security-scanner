name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run ruff check
        run: ruff check src tests

      - name: Check black formatting
        run: black --check src tests

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run mypy
        run: mypy src

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: pytest --cov=mcp_security_scanner --cov-report=xml

      - name: Upload coverage to Codecov (CLI)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -euo pipefail
          upload_coverage() {
            curl -fLso codecov https://cli.codecov.io/latest/linux/codecov
            curl -fLso codecov.SHA256SUM https://cli.codecov.io/latest/linux/codecov.SHA256SUM
            curl -fLso codecov.SHA256SUM.sig https://cli.codecov.io/latest/linux/codecov.SHA256SUM.sig
            curl -fLso codecov.pub https://keybase.io/codecovsecurity/pgp_keys.asc
            gpg --batch --import codecov.pub
            gpg --batch --verify codecov.SHA256SUM.sig codecov.SHA256SUM
            grep " codecov$" codecov.SHA256SUM | sha256sum --check
            chmod +x codecov
            ./codecov upload-coverage \
              --git-service github \
              --file ./coverage.xml \
              --flag unittests \
              --name "py${{ matrix.python-version }}"
          }

          if ! upload_coverage; then
            echo "Codecov upload failed; continuing without failing CI."
          fi

  build:
    name: Build Distribution
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Smoke-check built wheel CLI version
        run: |
          set -euo pipefail
          PROJECT_VERSION="$(python - <<'PY'
          import pathlib
          import tomllib

          payload = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(payload["project"]["version"])
          PY
          )"
          INIT_VERSION="$(python - <<'PY'
          import pathlib
          import re

          content = pathlib.Path("src/mcp_security_scanner/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if match is None:
              raise SystemExit("Unable to parse __version__ from src/mcp_security_scanner/__init__.py")
          print(match.group(1))
          PY
          )"
          WHEEL_VERSION="$(python - <<'PY'
          import glob
          import zipfile

          wheel_paths = sorted(glob.glob("dist/*.whl"))
          if not wheel_paths:
              raise SystemExit("Missing wheel artifact in dist/")

          with zipfile.ZipFile(wheel_paths[0]) as wheel:
              metadata_candidates = [name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")]
              if not metadata_candidates:
                  raise SystemExit("Missing wheel METADATA entry")
              metadata = wheel.read(metadata_candidates[0]).decode("utf-8")

          for line in metadata.splitlines():
              if line.startswith("Version: "):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("Unable to read Version from wheel METADATA")
          PY
          )"
          if [ "$PROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::pyproject version ($PROJECT_VERSION) does not match __version__ ($INIT_VERSION)."
            exit 1
          fi
          if [ "$PROJECT_VERSION" != "$WHEEL_VERSION" ]; then
            echo "::error::pyproject version ($PROJECT_VERSION) does not match wheel metadata version ($WHEEL_VERSION)."
            exit 1
          fi
          python -m pip install --force-reinstall dist/*.whl
          CLI_VERSION="$(mcp-scan --version | sed -E 's/^.*version[[:space:]]+//')"
          if [ "$CLI_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Installed CLI version ($CLI_VERSION) does not match project version ($PROJECT_VERSION)."
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: publish-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Validate tag/version and build artifacts
        run: |
          set -euo pipefail
          TAG_VERSION_RAW="${GITHUB_REF#refs/tags/v}"
          TAG_VERSION="$(printf '%s' "$TAG_VERSION_RAW" | sed -E 's/-([ab]|rc)/\1/g')"
          PROJECT_VERSION="$(python - <<'PY'
          import pathlib
          import tomllib

          payload = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(payload["project"]["version"])
          PY
          )"
          INIT_VERSION="$(python - <<'PY'
          import pathlib
          import re

          content = pathlib.Path("src/mcp_security_scanner/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if match is None:
              raise SystemExit("Unable to parse __version__ from src/mcp_security_scanner/__init__.py")
          print(match.group(1))
          PY
          )"
          WHEEL_VERSION="$(python - <<'PY'
          import glob
          import zipfile

          wheel_paths = sorted(glob.glob("dist/*.whl"))
          if not wheel_paths:
              raise SystemExit("Missing wheel artifact in dist/")

          with zipfile.ZipFile(wheel_paths[0]) as wheel:
              metadata_candidates = [name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")]
              if not metadata_candidates:
                  raise SystemExit("Missing wheel METADATA entry")
              metadata = wheel.read(metadata_candidates[0]).decode("utf-8")

          for line in metadata.splitlines():
              if line.startswith("Version: "):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("Unable to read Version from wheel METADATA")
          PY
          )"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION_RAW -> normalized $TAG_VERSION) does not match pyproject version ($PROJECT_VERSION)."
            exit 1
          fi
          if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION_RAW -> normalized $TAG_VERSION) does not match __version__ ($INIT_VERSION)."
            exit 1
          fi
          if [ "$TAG_VERSION" != "$WHEEL_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION_RAW -> normalized $TAG_VERSION) does not match wheel metadata version ($WHEEL_VERSION)."
            exit 1
          fi
          if ! ls dist/*.tar.gz >/dev/null 2>&1; then
            echo "::error::sdist artifact missing in dist/."
            exit 1
          fi
          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "::error::wheel artifact missing in dist/."
            exit 1
          fi
          if ! ls dist/*"$PROJECT_VERSION"* >/dev/null 2>&1; then
            echo "::error::Built artifacts do not include version $PROJECT_VERSION."
            exit 1
          fi

      - name: Verify wheel CLI version matches tag
        run: |
          set -euo pipefail
          TAG_VERSION_RAW="${GITHUB_REF#refs/tags/v}"
          TAG_VERSION="$(printf '%s' "$TAG_VERSION_RAW" | sed -E 's/-([ab]|rc)/\1/g')"
          python -m pip install --force-reinstall dist/*.whl
          CLI_VERSION="$(mcp-scan --version | sed -E 's/^.*version[[:space:]]+//')"
          if [ "$CLI_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Installed CLI version ($CLI_VERSION) does not match tag version ($TAG_VERSION_RAW -> normalized $TAG_VERSION)."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Sign release with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: ./dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets with --clobber"
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi

      - name: Verify PyPI version visibility
        run: |
          set -euo pipefail
          PACKAGE_NAME="ogulcanaydogan-mcp-security-scanner"
          TAG_VERSION_RAW="${GITHUB_REF#refs/tags/v}"
          TAG_VERSION="$(printf '%s' "$TAG_VERSION_RAW" | sed -E 's/-([ab]|rc)/\1/g')"
          ATTEMPTS=12
          SLEEP_SECONDS=10
          PIP_INDEX_ARGS=()
          if printf '%s' "$TAG_VERSION" | grep -Eq '(a|b|rc)[0-9]+$'; then
            PIP_INDEX_ARGS=(--pre)
          fi

          for attempt in $(seq 1 "$ATTEMPTS"); do
            OUTPUT="$(python -m pip index versions "${PIP_INDEX_ARGS[@]}" "$PACKAGE_NAME" 2>/dev/null || true)"
            VERSIONS_LINE="$(printf '%s\n' "$OUTPUT" | grep '^Available versions:' || true)"
            if printf '%s' "$VERSIONS_LINE" | grep -Eq "(^|[, ])${TAG_VERSION}([, ]|$)"; then
              echo "Version ${TAG_VERSION} is visible on PyPI (attempt ${attempt}/${ATTEMPTS})."
              exit 0
            fi
            echo "Version ${TAG_VERSION} not visible yet (attempt ${attempt}/${ATTEMPTS}); waiting ${SLEEP_SECONDS}s."
            sleep "$SLEEP_SECONDS"
          done

          echo "::error::Version ${TAG_VERSION} not visible on PyPI after ${ATTEMPTS} attempts."
          python -m pip index versions "${PIP_INDEX_ARGS[@]}" "$PACKAGE_NAME" || true
          exit 1
