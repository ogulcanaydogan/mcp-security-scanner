name: MCP Security Scanner
description: Scan MCP servers for security vulnerabilities as part of your CI pipeline

inputs:
  server-stdio-command:
    description: Command to start the MCP server (e.g., "python -m my_server")
    required: false
    default: ""

  config-file:
    description: Path to claude_desktop_config.json to scan multiple servers
    required: false
    default: ""

  format:
    description: Output format (json, html, sarif)
    required: false
    default: "sarif"

  output:
    description: Path to save the report
    required: false
    default: "mcp-scan-report.sarif"

  severity-threshold:
    description: Minimum severity to fail the check (critical, high, medium, low, info)
    required: false
    default: "high"

  timeout:
    description: Timeout in seconds for server responses
    required: false
    default: "30"

  verbose:
    description: Enable debug output
    required: false
    default: "false"

outputs:
  report-path:
    description: Path to the generated report
    value: ${{ steps.scan.outputs.report-path }}

  critical-count:
    description: Number of critical findings
    value: ${{ steps.scan.outputs.critical-count }}

  high-count:
    description: Number of high findings
    value: ${{ steps.scan.outputs.high-count }}

  medium-count:
    description: Number of medium findings
    value: ${{ steps.scan.outputs.medium-count }}

  low-count:
    description: Number of low findings
    value: ${{ steps.scan.outputs.low-count }}

  passed:
    description: Whether scan passed the severity threshold
    value: ${{ steps.scan.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install mcp-security-scanner
      shell: bash
      run: pip install mcp-security-scanner

    - name: Scan server(s)
      id: scan
      shell: bash
      run: |
        # Determine command based on inputs
        if [ -n "${{ inputs.server-stdio-command }}" ]; then
          SCAN_CMD="mcp-scan server '${{ inputs.server-stdio-command }}'"
        elif [ -n "${{ inputs.config-file }}" ]; then
          SCAN_CMD="mcp-scan config '${{ inputs.config-file }}'"
        else
          echo "Error: Either server-stdio-command or config-file must be provided"
          exit 1
        fi

        # Add common options
        SCAN_CMD="$SCAN_CMD --format ${{ inputs.format }} --output ${{ inputs.output }}"
        SCAN_CMD="$SCAN_CMD --timeout ${{ inputs.timeout }}"

        if [ "${{ inputs.verbose }}" == "true" ]; then
          SCAN_CMD="$SCAN_CMD --verbose"
        fi

        # Run scan (allow failure for now, we'll check threshold later)
        set +e
        eval "$SCAN_CMD"
        SCAN_EXIT_CODE=$?
        set -e

        # Set outputs
        echo "report-path=${{ inputs.output }}" >> "$GITHUB_OUTPUT"

        # TODO: Parse report and extract counts/pass status
        # This will depend on final report format
        echo "critical-count=0" >> "$GITHUB_OUTPUT"
        echo "high-count=0" >> "$GITHUB_OUTPUT"
        echo "medium-count=0" >> "$GITHUB_OUTPUT"
        echo "low-count=0" >> "$GITHUB_OUTPUT"
        echo "passed=true" >> "$GITHUB_OUTPUT"

        exit 0

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = '${{ steps.scan.outputs.report-path }}';

          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            let comment = '## MCP Security Scan Results\n\n';
            comment += `**Critical:** ${{ steps.scan.outputs.critical-count }} | `;
            comment += `**High:** ${{ steps.scan.outputs.high-count }} | `;
            comment += `**Medium:** ${{ steps.scan.outputs.medium-count }} | `;
            comment += `**Low:** ${{ steps.scan.outputs.low-count }}\n\n`;

            if (report.findings && report.findings.length > 0) {
              comment += '### Top Findings\n';
              report.findings.slice(0, 5).forEach(finding => {
                comment += `- **${finding.severity}** - ${finding.title}\n`;
              });

              if (report.findings.length > 5) {
                comment += `- ... and ${report.findings.length - 5} more\n`;
              }

              comment += `\n[View full report](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.head_ref }}/mcp-scan-report.sarif)`;
            } else {
              comment += '✓ No vulnerabilities found!\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

branding:
  icon: shield-check
  color: blue
